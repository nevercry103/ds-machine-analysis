[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    unit: fast unit tests (no I/O, no PLC, no DB)
    integration: tests that touch SQLite or filesystem
    plc: tests that need a real or simulated PLC connection
    api: tests that exercise the FastAPI app
    slow: tests >1s — excluded from default runs
filterwarnings =
    ignore::DeprecationWarning:asyncua.*
    ignore::DeprecationWarning:pymodbus.*
